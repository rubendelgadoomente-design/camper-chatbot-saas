services:
  - type: web
    name: camper-chatbot-saas
    runtime: docker
    plan: free # Puedes cambiar a 'starter' para disco persistente
    envVars:
      - key: PORT
        value: 3001
      - key: OPENAI_API_KEY
        sync: false
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
    healthCheckPath: /api/status
